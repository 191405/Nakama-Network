services:
  - type: redis
    name: nakama-redis
    region: oregon
    plan: free
    ipAllowList: []

  - type: web
    name: nakama-network-api
    env: python
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEBUG
        value: "false"
      - key: HOST
        value: 0.0.0.0
      - key: GEMINI_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: nakama-redis
          property: connectionString
      - key: CORS_ORIGINS
        value: "https://nakama-network.vercel.app,http://localhost:5173"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_EMAIL
        sync: false
      - key: SFTP_HOST
        value: access960253636.webspace-data.io
      - key: SFTP_PORT
        value: "22"
      - key: SFTP_USERNAME
        value: u112036877
      - key: SFTP_PASSWORD
        sync: false
      - key: SFTP_BASE_PATH
        value: /videos
      - key: SFTP_PUBLIC_URL
        value: https://platkelvconcept.net
